<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Access Denied</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: black;
      color: #00ff00;
      font-family: "Courier New", monospace;
      text-align: center;
    }

    .box {
      max-width: 700px;
      border: 2px solid red;
      padding: 30px;
      background: #050505;
    }

    h1 {
      color: red;
      margin-bottom: 20px;
    }

    p {
      margin: 10px 0;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<div class="box">
  <h1>⚠ ACCESS DENIED ⚠</h1>

  <p>I told you not to go to this page.</p>
  <p>This area is restricted and monitored.</p>

  <p>Unauthorized access has been detected.</p>
  <p>Your activity may be logged.</p>

  <br>

  <p><strong>This content is blocked by the FBI.</strong></p>

  <br>

  <p>Please leave this page immediately.</p>
</div>

</body>
</html>
